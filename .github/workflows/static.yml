<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego 3D LEYENDA</title>
<style>
body{margin:0;overflow:hidden;font-family:Arial;background:black;}
canvas{display:block;}

.controls{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
}

button{
padding:12px 20px;
margin:6px;
font-size:16px;
border:none;
border-radius:10px;
background:#111;
color:white;
cursor:pointer;
}

#ui{
position:fixed;
top:15px;
left:15px;
color:white;
font-size:18px;
}
</style>
</head>
<body>

<div id="ui">
Puntos: <span id="score">0</span><br>
Vidas: <span id="lives">3</span><br>
Récord: <span id="record">0</span>
</div>

<div class="controls">
<button onclick="moveLeft()">⬅</button>
<button onclick="jump()">⬆</button>
<button onclick="moveRight()">➡</button>
<button onclick="shoot()">🔫 Disparar</button>
<button onclick="resetGame()">🔄</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x000011);

const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.set(0,5,8);

const renderer=new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,7);
scene.add(light);

const floor=new THREE.Mesh(
new THREE.PlaneGeometry(30,200),
new THREE.MeshStandardMaterial({color:0x222222})
);
floor.rotation.x=-Math.PI/2;
scene.add(floor);

// Jugador
const player=new THREE.Mesh(
new THREE.BoxGeometry(1,1,1),
new THREE.MeshStandardMaterial({color:0x00ff00})
);
player.position.y=0.5;
scene.add(player);

// Enemigo
const enemy=new THREE.Mesh(
new THREE.BoxGeometry(1,1,1),
new THREE.MeshStandardMaterial({color:0xff0000})
);
enemy.position.set(0,0.5,-20);
scene.add(enemy);

// Balas jugador
let playerBullets=[];

// Bala enemigo
const enemyBullet=new THREE.Mesh(
new THREE.SphereGeometry(0.3,16,16),
new THREE.MeshStandardMaterial({color:0xffff00})
);
enemyBullet.position.y=-5;
scene.add(enemyBullet);

let score=0;
let lives=3;
let record=localStorage.getItem("recordLeyenda")||0;
document.getElementById("record").innerText=record;

let velocityY=0;
let gravity=-0.02;
let jumpCount=0;
let speed=0.2;
let shootTimer=0;

// Música
const music=new Audio("https://actions.google.com/sounds/v1/ambiences/warehouse.ogg");
music.loop=true;
music.volume=0.3;
music.play();

// Movimiento
function moveLeft(){player.position.x-=0.7;}
function moveRight(){player.position.x+=0.7;}

function jump(){
if(jumpCount<2){
velocityY=0.35;
jumpCount++;
}
}

// Disparo jugador
function shoot(){
const bullet=new THREE.Mesh(
new THREE.SphereGeometry(0.3,16,16),
new THREE.MeshStandardMaterial({color:0x00ffff})
);
bullet.position.set(player.position.x,1,player.position.z);
scene.add(bullet);
playerBullets.push(bullet);
}

function loseLife(){
lives--;
document.getElementById("lives").innerText=lives;

if(lives<=0){
if(score>record){
localStorage.setItem("recordLeyenda",score);
}
alert("🔥 GAME OVER 🔥 Puntaje: "+score);
resetGame();
}
}

function resetGame(){
score=0;
lives=3;
speed=0.2;
enemy.position.z=-20;
document.getElementById("score").innerText=score;
document.getElementById("lives").innerText=lives;
record=localStorage.getItem("recordLeyenda")||0;
document.getElementById("record").innerText=record;
}

document.addEventListener("keydown",e=>{
if(e.key==="ArrowLeft")moveLeft();
if(e.key==="ArrowRight")moveRight();
if(e.key==="ArrowUp")jump();
if(e.key===" ")shoot();
});

function animate(){
requestAnimationFrame(animate);

// Salto
velocityY+=gravity;
player.position.y+=velocityY;
if(player.position.y<=0.5){
player.position.y=0.5;
velocityY=0;
jumpCount=0;
}

// IA enemigo persigue al jugador
enemy.position.z+=speed;
enemy.position.x+= (player.position.x - enemy.position.x)*0.02;

if(enemy.position.z>5){
enemy.position.z=-30;
score++;
speed+=0.01;
}

// Disparo enemigo
shootTimer++;
if(shootTimer>120){
enemyBullet.position.set(enemy.position.x,1,enemy.position.z);
shootTimer=0;
}
enemyBullet.position.z+=0.4;

// Balas jugador
playerBullets.forEach((b,i)=>{
b.position.z-=0.6;

// Impacto enemigo
if(Math.abs(b.position.x-enemy.position.x)<1 &&
Math.abs(b.position.z-enemy.position.z)<1){
scene.remove(b);
playerBullets.splice(i,1);
enemy.position.z=-30;
score+=5;
}
});

// Colisión enemigo
if(Math.abs(player.position.x-enemy.position.x)<1 &&
Math.abs(player.position.z-enemy.position.z)<1 &&
player.position.y<1.2){
loseLife();
enemy.position.z=-30;
}

// Colisión bala enemigo
if(Math.abs(player.position.x-enemyBullet.position.x)<1 &&
Math.abs(player.position.z-enemyBullet.position.z)<1 &&
player.position.y<1.2){
loseLife();
enemyBullet.position.y=-5;
}

document.getElementById("score").innerText=score;

renderer.render(scene,camera);
}

animate();
</script>
</body>
</html>
